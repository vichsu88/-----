{# 共用 Modal 元件 — 由 admin.html 透過 include 載入 #}

<div id="product-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3 id="product-modal-title">新增/編輯商品</h3>
        <form id="product-form">
            <input type="hidden" name="productId">
            <label>分類</label>
            <select name="category">
                <option value="手工香品">手工香品</option>
                <option value="保養品">保養品</option>
                <option value="元帥娘愛用">元帥娘愛用</option>
                <option value="健康茶品">健康茶品</option>
                <option value="其他">其他</option>
            </select>
            <div class="product-series-box d-flex gap-10 mb-15">
                <div class="flex-2">
                    <label class="help-text">系列名稱 (選填)</label>
                    <input type="text" name="series" placeholder="例如：招財系列" list="series-list" class="mb-0">
                    <datalist id="series-list"></datalist>
                </div>
                <div class="flex-1">
                    <label class="help-text">系列排序 (數字)</label>
                    <input type="number" name="seriesSort" placeholder="1, 3, 5..." class="mb-0">
                </div>
            </div>
            <label>商品名稱</label><input type="text" name="name" required>
            <label>商品描述</label><textarea name="description" rows="3"></textarea>
            <label>商品圖片</label>
            <input type="file" id="product-image-input" accept="image/*">
            <input type="hidden" name="image">
            <img id="preview-image" class="product-preview-img mt-10">
            <div class="product-variant-box mt-20">
                <label class="text-brown">規格與價格設定</label>
                <div id="variants-container"></div>
                <button type="button" id="add-variant-btn" class="btn btn--grey w-100 mt-10 p-5">+ 新增規格</button>
            </div>
            <div class="mt-20 d-flex gap-20">
                <label class="checkbox-label"><input type="checkbox" name="isActive" checked> 上架中</label>
                <label class="checkbox-label text-brown"><input type="checkbox" name="isDonation"> 🙏 開放捐贈</label>
            </div>
            <button type="submit" class="btn btn--brown w-100 mt-20 p-12 fs-16">儲存商品</button>
        </form>
    </div>
</div>

<div id="order-detail-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3>訂單詳細資料</h3>
        <div id="order-detail-body" class="fs-16 lh-16 text-dark"></div>
    </div>
</div>

<div id="announcement-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3 id="ann-modal-title">新增公告</h3>
        <form id="announcement-form">
            <input type="hidden" name="announcementId">
            <label>日期 (YYYY/MM/DD)</label><input type="text" name="date" required>
            <label>標題</label><input type="text" name="title" required>
            <label>內文</label><textarea name="content" rows="5" required></textarea>
            <label class="checkbox-label"><input type="checkbox" name="isPinned"> 置頂顯示</label>
            <button type="submit" class="btn btn--brown w-100 mt-10">發布</button>
        </form>
    </div>
</div>

<div id="faq-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3 id="faq-modal-title">新增問答</h3>
        <form id="faq-form">
            <input type="hidden" name="faqId">
            <label>問題</label><input type="text" name="question" required>
            <label>回答</label><textarea name="answer" rows="5" required></textarea>
            <label>分類</label>
            <div id="faq-modal-category-btns" class="mb-10"></div>
            <input type="text" name="other_category" placeholder="輸入新分類或選擇上方">
            <label class="checkbox-label"><input type="checkbox" name="isPinned"> 置頂</label>
            <button type="submit" class="btn btn--brown w-100">儲存</button>
        </form>
    </div>
</div>

<div id="feedback-edit-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3>編輯回饋內容</h3>
        <form id="feedback-edit-form">
            <input type="hidden" name="feedbackId">
            <label>真實姓名</label><input type="text" name="realName">
            <label>顯示暱稱</label><input type="text" name="nickname">
            <label>分類</label><input type="text" name="category">
            <label>內容</label><textarea name="content" rows="5"></textarea>
            <label>電話</label><input type="text" name="phone">
            <label>地址</label><input type="text" name="address">
            <button type="submit" class="btn btn--brown w-100">儲存修改</button>
        </form>
    </div>
</div>

<div id="feedback-detail-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3>回饋詳細資料</h3>

    </div>
</div>

<div id="donation-detail-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3>詳細資料</h3>
        <div id="donation-detail-body" class="fs-16 lh-16 text-dark"></div>
    </div>
</div>

{# ===== 管理員帳號 Modal (RBAC 多權限 checkbox) ===== #}
<div id="admin-user-modal" class="admin-modal-overlay">
    <div class="admin-modal-content">
        <button class="modal-close-btn">&times;</button>
        <h3>新增管理員帳號</h3>
        <form id="admin-user-form">
            <label>帳號</label><input type="text" name="username" required placeholder="例如：finance01" autocomplete="off">
            <label>密碼 (至少 6 字元)</label><input type="password" name="password" required minlength="6" autocomplete="new-password">
            <label>權限設定 (可複選)</label>
            <div class="perm-checkbox-group">
                <label class="checkbox-label"><input type="checkbox" name="permissions" value="super_admin"> SuperAdmin — 全部權限</label>
                <label class="checkbox-label"><input type="checkbox" name="permissions" value="finance"> Finance — 財務稽核</label>
                <label class="checkbox-label"><input type="checkbox" name="permissions" value="ops"> Ops — 站務作業</label>
                <label class="checkbox-label"><input type="checkbox" name="permissions" value="data"> Data — 資料總管</label>
                <label class="checkbox-label"><input type="checkbox" name="permissions" value="cms"> CMS — 內容管理</label>
            </div>
            <button type="submit" class="btn btn--brown w-100 mt-10">建立帳號</button>
        </form>
    </div>
</div>
