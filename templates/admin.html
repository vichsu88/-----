<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>帥府後台管理系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root { 
            --main-brown: #C48945; 
            --main-brown-hover: #a57136;
            --sidebar-bg: #2c3e50; 
            --bg-light: #f4f6f9;
            --text-dark: #333;
            --text-gray: #666;
            --border-color: #ddd;
            --danger: #dc3545;
            --success: #28a745;
            --info: #007bff;
            --secondary: #6c757d;
        }
        
        /* --- Base & Reset --- */
        body { background-color: var(--bg-light); margin: 0; height: 100vh; overflow: hidden; display: flex; font-family: 'Microsoft JhengHei', sans-serif; color: var(--text-dark); }
        h2, h3 { margin-top: 0; }
        
        /* --- Utilities --- */
        /* 修正：移除 !important 以確保 JS style.display 可以運作 */
        .d-none { display: none; } 
        .d-flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .align-center { align-items: center; }
        .align-end { align-items: flex-end; }
        .flex-1 { flex: 1; }
        .gap-10 { gap: 10px; }
        .gap-20 { gap: 20px; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .w-100 { width: 100%; }
        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .mt-30 { margin-top: 30px; }
        .mb-0 { margin-bottom: 0 !important; }
        .mb-10 { margin-bottom: 10px; }
        .mb-15 { margin-bottom: 15px; }
        .mb-20 { margin-bottom: 20px; }
        .p-20 { padding: 20px; }
        
        /* --- Layout: Login --- */
        #login-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #eee; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }

        /* --- Layout: Admin Wrapper --- */
        #admin-wrapper { display: flex; width: 100%; height: 100%; }
        
        /* Sidebar */
        .admin-sidebar { width: 250px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { flex: 1; overflow-y: auto; padding-top: 20px; }
        .nav-item { display: block; width: 100%; padding: 15px 20px; color: #bdc3c7; background: none; border: none; text-align: left; font-size: 16px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(0,0,0,0.2); color: #fff; border-left-color: var(--main-brown); }
        
        /* Main Content */
        .admin-main { flex: 1; overflow-y: auto; padding: 30px; background: var(--bg-light); position: relative; width: 100%; box-sizing: border-box; }
        .page-title { margin-bottom: 20px; color: #333; border-bottom: 2px solid #E6BA67; padding-bottom: 10px; }
        
        /* Tabs */
        .tab-content { display: none; width: 100%; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Sub-tabs */
        .sub-tab-group { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .sub-tab-btn { flex: 1; padding: 15px; border: none; background: none; font-size: 16px; cursor: pointer; color: var(--text-gray); font-weight: bold; border-bottom: 4px solid transparent; transition: 0.3s; }
        .sub-tab-btn.active { color: var(--main-brown); border-bottom-color: var(--main-brown); background: rgba(196, 137, 69, 0.05); }
        .sub-tab-btn:hover { background: rgba(0,0,0,0.02); }

        /* --- Components --- */
        /* Cards */
        .card, .feedback-card, .admin-list-item { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .admin-list-item { padding: 15px; }
        .admin-list-item-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }

        /* Buttons */
        .btn { padding: 6px 12px; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 14px; transition: 0.2s; display: inline-block; text-align: center; }
        .btn:hover { opacity: 0.9; }
        .btn--brown { background: var(--main-brown); }
        .btn--red { background: var(--danger); }
        .btn--green { background: var(--success); }
        .btn--grey { background: var(--secondary); }
        .btn--blue { background: var(--info); }
        .btn-lg { padding: 10px 20px; font-size: 16px; }
        .btn-block { width: 100%; }

        /* Forms */
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        .form-row { display: flex; gap: 10px; align-items: center; }
        .form-row input { margin-bottom: 0; }
        .checkbox-label { display: inline-flex; align-items: center; cursor: pointer; margin-right: 20px; }
        .checkbox-label input { width: auto; margin: 0 10px 0 0; }
        .readonly-input { background-color: #e9ecef; cursor: not-allowed; color: #555; }
        .help-text { font-size: 13px; color: var(--text-gray); }

        /* Modals */
        .admin-modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .admin-modal-overlay.is-visible { display: flex; }
        .admin-modal-content { background: #fff; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; border: none; background: none; font-size: 24px; cursor: pointer; color: #999; }

        /* Feedback Specific */
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .status-header { padding: 10px; border-radius: 5px; margin: 0 0 10px 0; color: white; }
        .status-header.pending { background: var(--danger); }
        .status-header.approved { background: var(--success); }
        .status-header.sent { background: var(--info); }
        .feedback-content-box { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: #555; background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 10px 0; word-break: break-all; }
        .feedback-content-box.expanded { -webkit-line-clamp: unset; }
        .show-more-btn { color: var(--main-brown); background: none; border: none; cursor: pointer; font-size: 14px; padding: 0; font-weight: bold; text-decoration: underline; }

        /* Donation Toolbar */
        .donation-toolbar { display: flex; gap: 10px; flex-wrap: wrap; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Responsive */
        @media (max-width: 992px) { .feedback-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .admin-sidebar { position: fixed; left: -250px; height: 100%; z-index: 1000; }
            .admin-sidebar.open { left: 0; }
            #sidebar-toggle { display: block !important; position: fixed; top: 10px; left: 10px; z-index: 1001; background: var(--main-brown); color: white; padding: 10px; border-radius: 5px; border: none; }
            .admin-main { padding: 60px 15px 15px 15px; }
        }
        #sidebar-toggle { display: none; }
    </style>
</head>
<body>
    <div id="login-wrapper">
        <form id="login-form" class="login-box">
            <h2 style="color:var(--main-brown);">後台登入</h2>
            <input type="password" id="admin-password" placeholder="請輸入管理員密碼" required>
            <button type="submit" class="btn btn--brown btn-block" style="padding:12px;">登入系統</button>
            <p id="login-error" style="color:red; margin-top:10px; font-size:14px;"></p>
        </form>
    </div>

    <div id="admin-content" style="display:none;">
        <button id="sidebar-toggle">☰ 選單</button>
        <div id="sidebar-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>
        
        <div id="admin-wrapper">
            <aside class="admin-sidebar" id="admin-sidebar">
                <div class="sidebar-header">
                    <h3 class="mb-0">承天中承府</h3>
                    <small>後台管理系統</small>
                </div>
                <nav class="sidebar-nav">
                    <button class="nav-item active" data-tab="tab-products">🛍️ 商品管理</button>
                    <button class="nav-item" data-tab="tab-donations">🙏 捐贈管理</button>
                    <button class="nav-item" data-tab="tab-orders">📦 一般訂單</button>
                    <button class="nav-item" data-tab="tab-feedback">💬 信徒回饋</button>
                    <button class="nav-item" data-tab="tab-fund">📊 基金與公告</button>
                    <button class="nav-item" data-tab="tab-qa">❓ 常見問答</button>
                    <button class="nav-item" data-tab="tab-links">🔗 連結與設定</button>
                </nav>
                <div class="p-20">
                    <button id="logout-btn" class="btn btn--red btn-block">登出</button>
                </div>
            </aside>

            <main class="admin-main">
                <h2 id="page-title-display" class="page-title">商品管理</h2>

                <div id="tab-products" class="tab-content active">
                    <div class="text-right mb-20">
                        <button id="add-product-btn" class="btn btn--brown btn-lg">+ 新增商品</button>
                    </div>
                    <div id="products-list">載入中...</div>
                </div>

                <div id="tab-donations" class="tab-content">
                    <div class="sub-tab-group">
                        <button class="sub-tab-btn active" onclick="switchDonationTab('incense')">🕯️ 捐香 (日常)</button>
                        <button class="sub-tab-btn" onclick="switchDonationTab('fund')">🏗️ 建廟 (基金)</button>
                        <button class="sub-tab-btn" onclick="switchDonationTab('committee')">🏛️ 委員會</button>
                    </div>

                    <div id="subtab-incense">
                        <div class="donation-toolbar">
                            <div class="d-flex align-center gap-10">
                                <label class="mb-0">篩選：</label>
                                <select id="incense-report-filter" class="mb-0" style="width:120px;" onchange="fetchDonations('donation')">
                                    <option value="0">未稟告</option>
                                    <option value="1">已稟告</option>
                                    <option value="">全部</option>
                                </select>
                            </div>
                            <div class="flex-1 text-right">
                                <button class="btn btn--red" onclick="printRedPaper()">🖨️ 列印紅紙清單</button>
                            </div>
                        </div>
                        <div id="incense-list"></div>
                    </div>

                    <div id="subtab-fund" style="display:none;">
                        <div class="donation-toolbar">
                            <button class="btn btn--green" onclick="exportFundList()">📋 匯出建廟徵信清單</button>
                        </div>
                        <div id="fund-list"></div>
                    </div>

                    <div id="subtab-committee" style="display:none;">
                        <div class="donation-toolbar">
                            <span style="color:#666; font-weight:bold;">🏛️ 委員會護持名單審核與管理</span>
                        </div>
                        <div id="committee-list"></div>
                    </div>
                </div>

                <div id="tab-orders" class="tab-content">
                    <div class="d-flex justify-between align-center mb-20">
                        <span class="help-text">※ 僅顯示一般商品訂單</span>
                        <button class="btn btn--grey" onclick="fetchOrders()">🔄 重新整理</button>
                    </div>
                    <div id="orders-list"></div>
                </div>

                <div id="tab-feedback" class="tab-content">
                    <div id="fb-stats-bar" class="mb-20 d-flex gap-10 align-center"></div>

                    <div class="feedback-grid">
                        <div>
                            <h3 class="status-header pending">1. 待審核 (寄信通知)</h3>
                            <div id="fb-pending-list"></div>
                        </div>
                        <div>
                            <h3 class="status-header approved">2. 已刊登 / 待寄送</h3>
                            <div class="text-right mb-10">
                                <button class="btn btn--green" onclick="exportFeedbackTxt()">匯出名單</button>
                            </div>
                            <div id="fb-approved-list"></div>
                        </div>
                    </div>
                    <div class="mt-30">
                        <h3 class="status-header sent">3. 已寄送 (歷史紀錄)</h3>
                        <div class="text-right mb-10">
                            <button class="btn btn--blue" onclick="exportSentFeedbackTxt()">匯出名單</button>
                        </div>
                        <div id="fb-sent-list"></div>
                    </div>
                </div>

                <div id="tab-fund" class="tab-content">
                    <div class="card">
                        <h3>建廟基金設定</h3>
                        <form id="fund-form" class="d-flex gap-10 align-end" style="flex-wrap:wrap;">
                            <div class="flex-1">
                                <label>目標金額</label>
                                <input type="number" id="fund-goal" value="10000000">
                            </div>
                            <div class="flex-1">
                                <label>目前金額 <small class="text-danger" style="font-weight:normal;">(系統自動加總，無法手動修改)</small></label>
                                <input type="number" id="fund-current" value="0" class="readonly-input" readonly>
                            </div>
                            <button type="submit" class="btn btn--brown mb-15" style="height:42px;">更新設定</button>
                        </form>
                    </div>
                    <div class="d-flex justify-between mt-30 mb-15">
                        <h3>網站公告</h3>
                        <button id="add-announcement-btn" class="btn btn--brown">+ 新增公告</button>
                    </div>
                    <div id="announcements-list"></div>
                </div>

                <div id="tab-qa" class="tab-content">
                    <div class="text-right mb-20">
                        <button id="add-faq-btn" class="btn btn--brown">+ 新增問答</button>
                    </div>
                    <div id="faq-list"></div>
                </div>

                <div id="tab-links" class="tab-content">
                    <div class="feedback-grid">
                        <div class="card">
                            <h3 class="mt-0">🔗 外部連結設定</h3>
                            <div id="links-list"></div>
                        </div>
                        <div class="card">
    <h3 class="mt-0">🏦 匯款帳號設定</h3>
    <p class="help-text">設定不同用途的收款帳號，系統將自動帶入對應信件中。</p>
    
    <form id="bank-form">
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="flex:1; background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #eee;">
                <h4 style="margin-top:0; color:var(--main-brown);">賣場/捐香</h4>
                <label>銀行代碼</label><input type="text" name="shop_bankCode" placeholder="808">
                <label>銀行名稱</label><input type="text" name="shop_bankName" placeholder="玉山銀行">
                <label>帳號</label><input type="text" name="shop_account" placeholder="帳號...">
            </div>

            <div style="flex:1; background:#fff5f5; padding:15px; border-radius:8px; border:1px solid #ffcccc;">
                <h4 style="margin-top:0; color:#dc3545;">建廟基金</h4>
                <label>銀行代碼</label><input type="text" name="fund_bankCode" placeholder="103">
                <label>銀行名稱</label><input type="text" name="fund_bankName" placeholder="新光銀行">
                <label>帳號</label><input type="text" name="fund_account" placeholder="帳號...">
            </div>
        </div>
        <button type="submit" class="btn btn--brown btn-block mt-20">儲存所有匯款設定</button>
    </form>
</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="product-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3 id="product-modal-title">新增/編輯商品</h3>
            <form id="product-form">
                <input type="hidden" name="productId">
                <label>分類</label>
                <select name="category">
                    <option value="手工香品">手工香品</option>
                    <option value="保養品">保養品</option>
                    <option value="元帥娘愛用">元帥娘愛用</option>
                    <option value="健康茶品">健康茶品</option>
                    <option value="其他">其他</option>
                </select>
                
                <div style="background:#f0f4f8; padding:10px; border-radius:5px; margin-bottom:15px; border:1px dashed #ccc;" class="d-flex gap-10">
                    <div style="flex:2;">
                        <label class="help-text">系列名稱 (選填)</label>
                        <input type="text" name="series" placeholder="例如：招財系列" list="series-list" class="mb-0">
                        <datalist id="series-list"></datalist>
                    </div>
                    <div style="flex:1;">
                        <label class="help-text">系列排序 (數字)</label>
                        <input type="number" name="seriesSort" placeholder="1, 3, 5..." class="mb-0">
                    </div>
                </div>

                <label>商品名稱</label><input type="text" name="name" required>
                <label>商品描述</label><textarea name="description" rows="3"></textarea>
                <label>商品圖片</label>
                <input type="file" id="product-image-input" accept="image/*">
                <input type="hidden" name="image">
                <img id="preview-image" style="max-height:150px; display:none; margin-top:10px; border-radius:5px;">
                
                <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-top:20px; border:1px solid #eee;">
                    <label style="color:var(--main-brown);">規格與價格設定</label>
                    <div id="variants-container"></div>
                    <button type="button" id="add-variant-btn" class="btn btn--grey w-100 mt-10" style="padding:5px;">+ 新增規格</button>
                </div>

                <div class="mt-20 d-flex gap-20">
                    <label class="checkbox-label">
                        <input type="checkbox" name="isActive" checked> 上架中
                    </label>
                    <label class="checkbox-label" style="color:var(--main-brown);">
                        <input type="checkbox" name="isDonation"> 🙏 開放捐贈 (Donation)
                    </label>
                </div>
                <button type="submit" class="btn btn--brown w-100 mt-20" style="font-size:16px; padding:12px;">儲存商品</button>
            </form>
        </div>
    </div>

    <div id="order-detail-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3>訂單詳細資料</h3>
            <div id="order-detail-body" style="font-size:16px; line-height:1.6; color:#333;"></div>
        </div>
    </div>

    <div id="announcement-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3 id="ann-modal-title">新增公告</h3>
            <form id="announcement-form">
                <input type="hidden" name="announcementId"> 
                <label>日期 (YYYY/MM/DD)</label><input type="text" name="date" required>
                <label>標題</label><input type="text" name="title" required>
                <label>內文</label><textarea name="content" rows="5" required></textarea>
                <label class="checkbox-label"><input type="checkbox" name="isPinned"> 置頂顯示</label>
                <button type="submit" class="btn btn--brown w-100 mt-10">發布</button>
            </form>
        </div>
    </div>

    <div id="faq-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3 id="faq-modal-title">新增問答</h3>
            <form id="faq-form">
                <input type="hidden" name="faqId"> 
                <label>問題</label><input type="text" name="question" required>
                <label>回答</label><textarea name="answer" rows="5" required></textarea>
                <label>分類</label>
                <div id="faq-modal-category-btns" class="mb-10"></div>
                <input type="text" name="other_category" placeholder="輸入新分類或選擇上方">
                <label class="checkbox-label"><input type="checkbox" name="isPinned"> 置頂</label>
                <button type="submit" class="btn btn--brown w-100">儲存</button>
            </form>
        </div>
    </div>

    <div id="feedback-edit-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3>編輯回饋內容</h3>
            <form id="feedback-edit-form">
                <input type="hidden" name="feedbackId">
                <label>真實姓名</label><input type="text" name="realName">
                <label>顯示暱稱</label><input type="text" name="nickname">
                <label>分類</label><input type="text" name="category">
                <label>內容</label><textarea name="content" rows="5"></textarea>
                <label>電話</label><input type="text" name="phone">
                <label>地址</label><input type="text" name="address">
                <button type="submit" class="btn btn--brown w-100">儲存修改</button>
            </form>
        </div>
    </div>

    <div id="feedback-detail-modal" class="admin-modal-overlay">
        <div class="admin-modal-content">
            <button class="modal-close-btn">&times;</button>
            <h3>回饋詳細資料</h3>
            <div id="feedback-detail-body" style="line-height:1.8; color:#333;"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
